<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSight — AI Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>EchoSight</h1>
            <div id="status">Загрузка ИИ...</div>
        </header>

        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        
        <div class="controls">
            <button id="text-btn" class="main-btn">Читать текст</button>
            <button id="obj-btn" class="main-btn">Что перед мной?</button>
        </div>

        <div id="result-box">
            <p id="output-text">Нажмите кнопку, чтобы начать</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
