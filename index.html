<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSight Pro — Точное зрение</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">ECHOSIGHT PRO</div>
            <div id="status-indicator"><span id="status-text">Загрузка ИИ...</span></div>
        </header>

        <div class="viewport">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="scan-line"></div>
        </div>
        
        <div class="interface">
            <div id="result-box">
                <p id="output-text">Наведите камеру на объект или купюру</p>
            </div>
            <div class="button-grid">
                <button id="obj-btn" class="main-btn">ЧТО ПЕРЕДО МНОЙ?</button>
                <button id="text-btn" class="main-btn">УЗНАТЬ НОМИНАЛ</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
